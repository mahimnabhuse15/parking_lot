# AutoPark Spring Boot Configuration
server.port=8080

# Database Configuration - Cloud Railway (with Local fallback)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:autopark}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:mahibhuse @115}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Additional Configuration
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=true

# JPA/Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Custom JSON Web Token Settings
# 256-bit secure hex key
jwt.secret=9a4f2c8d3b7a1e5f8c6b2a7d4e3f8a9c2b4d6e8f0a1c3b5d7e9f2a4c6b8d0e1f
# Token expiration: 24 hours in milliseconds (86400000)
jwt.expiration=86400000

# Custom GST Billing Settings (18% split GST)
billing.tax.cgst.rate=0.09
billing.tax.sgst.rate=0.09
