# Server Port
server.port=8081

# H2 Database Configurations
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Enabled for easy verification
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Custom JSON Web Token Settings
# 256-bit secure hex key
jwt.secret=9a4f2c8d3b7a1e5f8c6b2a7d4e3f8a9c2b4d6e8f0a1c3b5d7e9f2a4c6b8d0e1f
# Token expiration: 24 hours in milliseconds (86400000)
jwt.expiration=86400000
