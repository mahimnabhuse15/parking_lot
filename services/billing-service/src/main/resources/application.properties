# Server Port
server.port=8082

# H2 Database Configurations - Memory only (RAM)
spring.datasource.url=jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Enabled for easy verification
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Tax Rates (split 9% CGST and 9% SGST)
billing.tax.cgst.rate=0.09
billing.tax.sgst.rate=0.09
